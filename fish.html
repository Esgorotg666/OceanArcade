<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#010c18;color:#fff;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;user-select:none;}

/* HUD, Boss, Game, Bet, Overlays — full original styles */
#hud{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;padding:8px 14px;background:linear-gradient(180deg,rgba(0,8,22,.99),rgba(0,5,15,.96));border-bottom:2px solid #00d4ff;z-index:20;flex-shrink:0;box-shadow:0 2px 28px rgba(0,212,255,.22),0 0 0 1px rgba(0,212,255,.06);}
.hud-btn{background:rgba(0,212,255,.13);border:1.5px solid #00d4ff;color:#00d4ff;padding:5px 13px;border-radius:20px;cursor:pointer;font-size:.8em;font-weight:600;letter-spacing:1px;text-decoration:none;transition:.15s;box-shadow:0 0 10px rgba(0,212,255,.15);}
.hud-btn:hover{background:rgba(0,212,255,.3);box-shadow:0 0 18px rgba(0,212,255,.35)}
.hud-stat{text-align:center;min-width:54px}.hud-label{font-size:.6em;color:#6690aa;letter-spacing:1px;text-transform:uppercase}.hud-val{font-size:1.15em;font-weight:800}
#coinsVal{color:#ffd700;text-shadow:0 0 12px rgba(255,215,0,.7)}#scoreVal{color:#00ff88;text-shadow:0 0 10px rgba(0,255,136,.6)}
#levelVal{color:#c084fc;text-shadow:0 0 10px rgba(168,85,247,.7)}#ammoVal{color:#ff6b35;text-shadow:0 0 8px rgba(255,107,53,.5)}
#comboVal{color:#ff00cc;transition:.1s;display:inline-block;text-shadow:0 0 8px rgba(255,0,204,.4)}.combo-glow{text-shadow:0 0 14px #ff00cc,0 0 28px #ff00cc!important;transform:scale(1.2)!important}
#bossBar{display:none;position:relative;z-index:18;background:linear-gradient(90deg,rgba(2,8,20,.95),rgba(40,10,5,.95),rgba(2,8,20,.95));border-bottom:1px solid #ff6b35;padding:4px 14px;flex-shrink:0;box-shadow:0 2px 16px rgba(255,107,53,.2);}
.boss-label{font-size:.65em;color:#ff6b35;letter-spacing:2px;margin-bottom:3px;text-shadow:0 0 8px rgba(255,107,53,.6)}
.boss-track{height:9px;background:#1a0a0a;border-radius:5px;overflow:hidden;box-shadow:inset 0 0 6px rgba(0,0,0,.8)}
.boss-fill{height:100%;background:linear-gradient(90deg,#ff3300,#ff6b35,#ffd700);border-radius:5px;transition:width .2s;box-shadow:0 0 8px rgba(255,107,53,.6)}
#gameWrap{position:relative;flex:1;overflow:hidden;cursor:crosshair}#gameCanvas{display:block;width:100%;height:100%}
.bet-bar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:6px;align-items:center;z-index:15;}
.bet-row{display:flex;gap:5px;}
.bet-btn,.wpn-btn{background:rgba(0,0,0,.75);border:1.5px solid #2a3a4a;color:#778899;padding:5px 10px;border-radius:11px;cursor:pointer;font-size:.74em;font-weight:700;transition:.15s;white-space:nowrap;letter-spacing:.5px;backdrop-filter:blur(4px);}
.bet-btn.active,.wpn-btn.active{border-color:#ffd700;color:#ffd700;background:rgba(255,215,0,.18);box-shadow:0 0 12px rgba(255,215,0,.3)}
.overlay{display:none;position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(0,15,35,.92) 0%,rgba(0,5,15,.97) 100%);align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:30;backdrop-filter:blur(2px);}
.overlay.active{display:flex}.overlay h2{font-size:2.4em;font-weight:900;color:#ffd700;letter-spacing:2px;text-shadow:0 0 30px #ffd700,0 0 60px rgba(255,215,0,.3),0 2px 0 rgba(0,0,0,.5)}
.big-btn{background:linear-gradient(135deg,#00e5ff,#0099cc);color:#000;font-weight:900;font-size:1.1em;padding:14px 36px;border:none;border-radius:30px;cursor:pointer;letter-spacing:1.5px;box-shadow:0 0 28px rgba(0,212,255,.65),0 4px 16px rgba(0,0,0,.4);transition:.18s;animation:btnPulse 2.5s ease-in-out infinite;}
.big-btn:hover{filter:brightness(1.18);transform:scale(1.06);animation:none;box-shadow:0 0 44px rgba(0,212,255,.9),0 4px 20px rgba(0,0,0,.4)}
@keyframes btnPulse{0%,100%{box-shadow:0 0 28px rgba(0,212,255,.65),0 4px 16px rgba(0,0,0,.4)}50%{box-shadow:0 0 48px rgba(0,212,255,.95),0 0 80px rgba(0,150,255,.3),0 4px 16px rgba(0,0,0,.4)}}
.kill-popup{position:absolute;font-weight:900;pointer-events:none;text-shadow:0 0 10px currentColor,0 2px 4px rgba(0,0,0,.8);animation:popUp 1s ease-out forwards;z-index:25;font-size:1.1em;}
@keyframes popUp{0%{opacity:1;transform:translateY(0) scale(.8)}20%{transform:translateY(-15px) scale(1.15)}100%{opacity:0;transform:translateY(-80px) scale(1.3)}}
#bigMsg{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-size:clamp(1.5em,5.5vw,2.6em);font-weight:900;pointer-events:none;z-index:26;opacity:0;text-align:center;line-height:1.3;letter-spacing:1px;transition:opacity .3s;text-shadow:0 0 30px currentColor,0 2px 0 rgba(0,0,0,.6);}
#soundToggle{position:absolute;top:8px;right:10px;font-size:1.1em;cursor:pointer;background:rgba(0,0,0,.5);border:1px solid #2a3a4a;border-radius:8px;padding:3px 8px;z-index:25;user-select:none;color:#aaa;backdrop-filter:blur(4px);}
</style>
</head>
