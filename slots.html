<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Slots – JUWA 2.0</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--ocean:#030b1a;--card:#080d20;--cyan:#00d4ff;--gold:#ffd700;--purple:#a855f7}
  body{
    min-height:100vh;background:var(--ocean);color:#fff;
    font-family:'Segoe UI',Arial,sans-serif;display:flex;flex-direction:column;
    align-items:center;overflow-x:hidden;
  }

  /* bg */
  #bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

  /* header */
  header{
    position:relative;z-index:10;width:100%;display:flex;align-items:center;
    justify-content:space-between;padding:12px 20px;
    background:rgba(3,11,26,.94);border-bottom:2px solid var(--cyan);
    box-shadow:0 0 18px rgba(0,212,255,.25);
  }
  .hud-btn{
    background:rgba(0,212,255,.12);border:1.5px solid var(--cyan);
    color:var(--cyan);padding:7px 16px;border-radius:20px;
    cursor:pointer;font-size:.82em;font-weight:600;text-decoration:none;transition:.15s;
  }
  .hud-btn:hover{background:rgba(0,212,255,.28)}
  .credits-box{
    display:flex;align-items:center;gap:8px;
    background:rgba(255,215,0,.1);border:1.5px solid var(--gold);
    border-radius:28px;padding:7px 16px;
  }
  .credits-box span:first-child{font-size:.7em;color:#aaa;letter-spacing:1px}
  #coinsVal{font-size:1.25em;font-weight:700;color:var(--gold)}

  /* machine */
  .machine{
    position:relative;z-index:5;margin:24px auto;width:min(500px,96vw);
    background:linear-gradient(170deg,#0a0d2a,#060818);
    border:3px solid #1a2060;border-radius:24px;padding:20px;
    box-shadow:0 0 40px rgba(168,85,247,.3),0 0 80px rgba(0,0,0,.6);
  }

  .machine-title{
    text-align:center;font-size:1.6em;font-weight:900;letter-spacing:3px;
    background:linear-gradient(90deg,var(--cyan),var(--gold),var(--purple));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    margin-bottom:16px;text-transform:uppercase;
  }

  /* reels */
  .reels-wrap{
    display:flex;gap:10px;justify-content:center;
    background:#04091a;border-radius:16px;padding:12px;
    border:2px solid #1a2060;position:relative;overflow:hidden;
  }

  .win-line{
    position:absolute;left:10px;right:10px;top:50%;transform:translateY(-50%);
    height:3px;background:rgba(255,215,0,.0);border-radius:2px;
    transition:background .3s;pointer-events:none;z-index:5;
  }
  .win-line.lit{background:rgba(255,215,0,.7);box-shadow:0 0 12px var(--gold)}

  .reel{
    width:90px;background:#050d1f;border:2px solid #1a3060;
    border-radius:12px;overflow:hidden;position:relative;height:270px;
  }
  .reel-inner{
    display:flex;flex-direction:column;
    transition:none;
  }
  .reel-cell{
    height:90px;display:flex;align-items:center;justify-content:center;
    font-size:2.6em;flex-shrink:0;
  }
  .reel-cell.highlight{background:rgba(255,215,0,.12)}

  /* win overlay on reels */
  .reel.winner{border-color:var(--gold);box-shadow:0 0 20px var(--gold)}

  /* info row */
  .info-row{
    display:flex;justify-content:space-around;align-items:center;
    margin:14px 0;padding:10px 0;border-top:1px solid #1a2060;border-bottom:1px solid #1a2060;
  }
  .info-item{text-align:center}
  .info-label{font-size:.65em;color:#556;letter-spacing:1px}
  .info-val{font-size:1.2em;font-weight:700;margin-top:2px}
  #winAmt{color:var(--gold)}
  #totalBet{color:var(--cyan)}
  #spinCount{color:var(--purple)}

  /* bet controls */
  .bet-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
  .bet-btn{
    padding:6px 16px;border-radius:20px;border:1.5px solid #334;
    background:rgba(255,255,255,.04);color:#aaa;cursor:pointer;font-size:.82em;font-weight:600;transition:.15s;
  }
  .bet-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.1)}
  .bet-btn:hover:not(.active){border-color:#556}

  /* spin button */
  .spin-btn{
    display:block;width:100%;padding:16px;font-size:1.2em;font-weight:800;
    letter-spacing:2px;border:none;border-radius:14px;cursor:pointer;
    background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;
    box-shadow:0 0 24px rgba(168,85,247,.5);transition:.2s;
    position:relative;overflow:hidden;
  }
  .spin-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 4px 30px rgba(168,85,247,.7)}
  .spin-btn:disabled{background:#222;color:#444;cursor:not-allowed;box-shadow:none}
  .spin-btn::after{
    content:''; position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
    transform:translateX(-100%);transition:.5s;
  }
  .spin-btn:hover::after{transform:translateX(100%)}

  /* result banner */
  #resultBanner{
    text-align:center;font-size:1.3em;font-weight:800;letter-spacing:1px;
    min-height:2em;line-height:2em;margin:10px 0;transition:.2s;
  }
  .result-win{color:var(--gold);text-shadow:0 0 20px var(--gold);animation:pulseWin 1s ease-in-out 3}
  .result-loss{color:#445;font-size:1em;font-weight:400}
  @keyframes pulseWin{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

  /* paytable */
  .paytable-toggle{
    display:block;text-align:center;color:#556;font-size:.8em;
    cursor:pointer;margin-top:6px;letter-spacing:1px;
  }
  .paytable-toggle:hover{color:#aaa}
  .paytable{
    display:none;margin-top:10px;background:#04091a;border-radius:12px;
    border:1px solid #1a2060;padding:12px;
  }
  .paytable.open{display:block}
  .paytable table{width:100%;border-collapse:collapse;font-size:.82em}
  .paytable td,.paytable th{padding:5px 8px;text-align:left;border-bottom:1px solid #1a2060}
  .paytable th{color:#556;font-size:.75em;letter-spacing:1px}
  .paytable .pay-mult{text-align:right;color:var(--gold);font-weight:700}

  /* win burst overlay */
  #burstOverlay{
    display:none;position:fixed;inset:0;z-index:50;pointer-events:none;
    align-items:center;justify-content:center;flex-direction:column;
  }
  #burstOverlay.show{display:flex}
  .burst-text{
    font-size:clamp(2em,10vw,4em);font-weight:900;
    color:var(--gold);text-shadow:0 0 40px var(--gold);
    animation:bigPop .5s ease-out;
  }
  @keyframes bigPop{from{transform:scale(0) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
  #burstCanvas{position:fixed;inset:0;pointer-events:none}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="burstCanvas"></canvas>

<header>
  <a href="index.html" class="hud-btn">← LOBBY</a>
  <div style="font-size:1.2em;font-weight:800;letter-spacing:2px;color:var(--purple)">🎰 LUCKY SLOTS</div>
  <div class="credits-box">
    <span>COINS</span>
    <span id="coinsVal">0</span>
  </div>
</header>

<div class="machine">
  <div class="machine-title">⚡ Lucky Slots ⚡</div>

  <div class="reels-wrap">
    <div class="win-line" id="winLine"></div>
    <div class="reel" id="reel0"><div class="reel-inner" id="ri0"></div></div>
    <div class="reel" id="reel1"><div class="reel-inner" id="ri1"></div></div>
    <div class="reel" id="reel2"><div class="reel-inner" id="ri2"></div></div>
  </div>

  <div class="info-row">
    <div class="info-item"><div class="info-label">LAST WIN</div><div class="info-val" id="winAmt">—</div></div>
    <div class="info-item"><div class="info-label">BET</div><div class="info-val" id="totalBet">10</div></div>
    <div class="info-item"><div class="info-label">SPINS</div><div class="info-val" id="spinCount">0</div></div>
  </div>

  <div class="bet-row">
    <button class="bet-btn" onclick="setBet(5)">5</button>
    <button class="bet-btn active" onclick="setBet(10)" id="defBet">10</button>
    <button class="bet-btn" onclick="setBet(25)">25</button>
    <button class="bet-btn" onclick="setBet(50)">50</button>
    <button class="bet-btn" onclick="setBet(100)">100</button>
  </div>

  <div id="resultBanner"></div>

  <button class="spin-btn" id="spinBtn" onclick="spin()">🎰 SPIN</button>

  <span class="paytable-toggle" onclick="document.getElementById('pt').classList.toggle('open')">
    📋 View Paytable ▾
  </span>
  <div class="paytable" id="pt">
    <table>
      <tr><th>Symbols</th><th>Name</th><th class="pay-mult">Payout</th></tr>
      <tr><td>7️⃣7️⃣7️⃣</td><td>JACKPOT</td><td class="pay-mult">× 100</td></tr>
      <tr><td>💎💎💎</td><td>Diamonds</td><td class="pay-mult">× 50</td></tr>
      <tr><td>⭐⭐⭐</td><td>Stars</td><td class="pay-mult">× 30</td></tr>
      <tr><td>🔔🔔🔔</td><td>Bells</td><td class="pay-mult">× 20</td></tr>
      <tr><td>🍒🍒🍒</td><td>Cherries</td><td class="pay-mult">× 15</td></tr>
      <tr><td>🍋🍋🍋</td><td>Lemons</td><td class="pay-mult">× 10</td></tr>
      <tr><td>🍊🍊🍊</td><td>Oranges</td><td class="pay-mult">× 5</td></tr>
      <tr><td>Any 2× 7️⃣</td><td>Lucky Pair</td><td class="pay-mult">× 10</td></tr>
      <tr><td>Any 2 match</td><td>Pair</td><td class="pay-mult">× 2</td></tr>
    </table>
  </div>
</div>

<div id="burstOverlay">
  <div class="burst-text" id="burstText"></div>
</div>

<script>
// ===================== Shared Credits =====================
const STORAGE={credits:'juwa_credits',spins:'juwa_spins',wins:'juwa_wins'};
const getCredits=()=>parseInt(localStorage.getItem(STORAGE.credits)||1000);
const setCredits=v=>{ localStorage.setItem(STORAGE.credits,v); document.getElementById('coinsVal').textContent=v.toLocaleString(); };
const addSpin=()=>{ const v=(parseInt(localStorage.getItem(STORAGE.spins)||0))+1; localStorage.setItem(STORAGE.spins,v); };
const addWin=()=>{ const v=(parseInt(localStorage.getItem(STORAGE.wins)||0))+1; localStorage.setItem(STORAGE.wins,v); };

// ===================== Symbols =====================
const SYMBOLS=['7️⃣','💎','⭐','🔔','🍒','🍋','🍊'];
const WEIGHTS=[  4,   7,  10,  14,  18,  22,  25]; // cumulative weights

function pickSymbol(){
  const r=Math.random()*WEIGHTS[WEIGHTS.length-1];
  for(let i=0;i<WEIGHTS.length;i++) if(r<WEIGHTS[i]) return SYMBOLS[i];
  return SYMBOLS[SYMBOLS.length-1];
}

const PAYOUTS={
  '7️⃣':100,'💎':50,'⭐':30,'🔔':20,'🍒':15,'🍋':10,'🍊':5
};

function calcWin(s0,s1,s2,bet){
  if(s0===s1&&s1===s2) return bet*PAYOUTS[s0];
  // two 7s
  const sevens=[s0,s1,s2].filter(s=>s==='7️⃣').length;
  if(sevens>=2) return bet*10;
  // any pair
  if(s0===s1||s1===s2||s0===s2) return bet*2;
  return 0;
}

// ===================== Reel Setup =====================
const NUM_STRIPS=24; // symbols per reel strip
let reelStrips=[[],[],[]];

function buildStrips(){
  for(let r=0;r<3;r++){
    reelStrips[r]=[];
    for(let i=0;i<NUM_STRIPS;i++) reelStrips[r].push(pickSymbol());
  }
}

// Indexes pointing to the CENTER cell currently shown
let reelPos=[0,0,0];

function renderReels(final=false){
  for(let r=0;r<3;r++){
    const ri=document.getElementById('ri'+r);
    const strip=reelStrips[r];
    const N=strip.length;
    const pos=reelPos[r];
    // show 3 cells: pos-1, pos, pos+1
    let cells='';
    for(let i=-1;i<=1;i++){
      const idx=((pos+i)%N+N)%N;
      cells+=`<div class="reel-cell${i===0?' highlight':''}">${strip[idx]}</div>`;
    }
    ri.innerHTML=cells;
  }
}

buildStrips();
renderReels();

// ===================== State =====================
let bet=10, spinning=false, totalSpins=0;
let betBtns=document.querySelectorAll('.bet-btn');

function setBet(v){
  bet=v;
  document.getElementById('totalBet').textContent=v;
  betBtns.forEach(b=>b.classList.toggle('active',parseInt(b.textContent)===v));
}

// ===================== Spin Logic =====================
async function spin(){
  if(spinning) return;
  const credits=getCredits();
  if(credits<bet){
    alert('Not enough coins! Go to the lobby to get free coins.');
    return;
  }
  setCredits(credits-bet);
  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('resultBanner').textContent='';
  document.getElementById('resultBanner').className='';
  document.getElementById('winLine').classList.remove('lit');
  [0,1,2].forEach(i=>document.getElementById('reel'+i).classList.remove('winner'));

  addSpin();
  totalSpins++;
  document.getElementById('spinCount').textContent=totalSpins;

  // Determine final symbols
  const finals=[pickSymbol(),pickSymbol(),pickSymbol()];
  for(let r=0;r<3;r++){
    // Force final into the strip at the target position
    const N=reelStrips[r].length;
    reelStrips[r][((reelPos[r])%N+N)%N]=finals[r];
  }

  // Animate each reel, stopping one after another
  const durations=[800,1100,1400];
  const promises=durations.map((dur,r)=>animReel(r,dur));
  await Promise.all(promises);

  // Show result
  const winAmt=calcWin(finals[0],finals[1],finals[2],bet);
  if(winAmt>0){
    setCredits(getCredits()+winAmt);
    addWin();
    document.getElementById('winAmt').textContent='+'+winAmt.toLocaleString();
    document.getElementById('resultBanner').textContent=`🎉 YOU WIN ${winAmt.toLocaleString()} COINS!`;
    document.getElementById('resultBanner').className='result-win';
    document.getElementById('winLine').classList.add('lit');
    // highlight winning reels
    if(finals[0]===finals[1]&&finals[1]===finals[2]){
      [0,1,2].forEach(i=>document.getElementById('reel'+i).classList.add('winner'));
    }
    if(winAmt>=bet*30) showBurst(winAmt);
    spawnConfetti(winAmt);
  } else {
    document.getElementById('winAmt').textContent='—';
    document.getElementById('resultBanner').textContent='Better luck next spin…';
    document.getElementById('resultBanner').className='result-loss';
  }

  spinning=false;
  document.getElementById('spinBtn').disabled=false;
}

function animReel(r,duration){
  return new Promise(resolve=>{
    const N=reelStrips[r].length;
    const startTime=performance.now();
    let lastFrame=startTime;
    const baseSpd=0.5;

    function frame(now){
      const elapsed=now-startTime;
      const progress=Math.min(1,elapsed/duration);
      // ease-out deceleration
      const speed=baseSpd*(1-Math.pow(progress,.7));
      const dt=now-lastFrame; lastFrame=now;
      reelPos[r]=(reelPos[r]+speed*(dt/16))%N;
      renderReels();
      if(progress<1) requestAnimationFrame(frame);
      else {
        // snap to integer
        reelPos[r]=Math.round(reelPos[r])%N;
        renderReels(true);
        resolve();
      }
    }
    requestAnimationFrame(frame);
  });
}

// ===================== Burst Overlay =====================
function showBurst(amt){
  const el=document.getElementById('burstOverlay');
  document.getElementById('burstText').textContent=`💰 +${amt.toLocaleString()}!`;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// ===================== Confetti =====================
const bc=document.getElementById('burstCanvas');
const bctx=bc.getContext('2d');
bc.width=innerWidth; bc.height=innerHeight;
window.addEventListener('resize',()=>{ bc.width=innerWidth; bc.height=innerHeight });
let confettiParticles=[];

function spawnConfetti(winAmt){
  const count=winAmt>=bet*30?120:winAmt>=bet*10?60:25;
  const colors=['#ffd700','#ff6b35','#00d4ff','#a855f7','#00ff88','#fff'];
  for(let i=0;i<count;i++){
    confettiParticles.push({
      x:innerWidth/2+( Math.random()-.5)*300,
      y:innerHeight*.3,
      vx:(Math.random()-.5)*8,
      vy:-(Math.random()*6+2),
      r:Math.random()*6+3,
      color:colors[Math.floor(Math.random()*colors.length)],
      life:1,decay:.012+Math.random()*.01,
      rot:Math.random()*360, rotV:(Math.random()-.5)*5
    });
  }
  if(confettiParticles.length>0) drawConfetti();
}

function drawConfetti(){
  bctx.clearRect(0,0,bc.width,bc.height);
  confettiParticles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.15; p.life-=p.decay; p.rot+=p.rotV;
    bctx.save();
    bctx.globalAlpha=Math.max(0,p.life);
    bctx.translate(p.x,p.y); bctx.rotate(p.rot*Math.PI/180);
    bctx.fillStyle=p.color;
    bctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);
    bctx.restore();
  });
  confettiParticles=confettiParticles.filter(p=>p.life>0);
  if(confettiParticles.length>0) requestAnimationFrame(drawConfetti);
  else bctx.clearRect(0,0,bc.width,bc.height);
}

// ===================== BG Canvas =====================
const bgC=document.getElementById('bgCanvas');
const bgCtx=bgC.getContext('2d');
bgC.width=innerWidth; bgC.height=innerHeight;
window.addEventListener('resize',()=>{ bgC.width=innerWidth; bgC.height=innerHeight });

let stars=[];
for(let i=0;i<80;i++){
  stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.5+.3,twinkle:Math.random()*Math.PI*2});
}

function drawBg2(){
  const g=bgCtx.createLinearGradient(0,0,0,bgC.height);
  g.addColorStop(0,'#020510'); g.addColorStop(1,'#0a0218');
  bgCtx.fillStyle=g; bgCtx.fillRect(0,0,bgC.width,bgC.height);
  stars.forEach(s=>{
    s.twinkle+=.02;
    const op=.3+Math.sin(s.twinkle)*.25;
    bgCtx.beginPath();
    bgCtx.arc(s.x*bgC.width,s.y*bgC.height,s.r,0,Math.PI*2);
    bgCtx.fillStyle=`rgba(200,200,255,${op})`;
    bgCtx.fill();
  });
  requestAnimationFrame(drawBg2);
}
drawBg2();

// Init
setCredits(getCredits());
document.getElementById('defBet').classList.add('active');
</script>
</body>
</html>
